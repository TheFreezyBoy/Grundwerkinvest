version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: grundwerkinvest-app:latest
    container_name: grundwerkinvest-app
    restart: always
    ports:
      - '3000:3000'
    environment:
      DATABASE_URI: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      PAYLOAD_SECRET: ${PAYLOAD_SECRET}
      NEXT_PUBLIC_SERVER_URL: ${NEXT_PUBLIC_SERVER_URL}
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgis/postgis:15-3.3-alpine
    container_name: grundwerkinvest-db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-grundwerkinvest_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-grundwerkinvest_pass}
      POSTGRES_DB: ${POSTGRES_DB:-grundwerkinvest_db}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
